<!DOCTYPE html>
<html>
<head>
  <title>Smart Drainage System</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
    body {
      margin:0;
      font-family:'Segoe UI';
      background:#0f172a;
      color:white;
      text-align:center;
    }

    #network {
      height:450px;
      margin:20px;
      background:#020617;
      border-radius:10px;
    }

    button {
      padding:10px 20px;
      margin:10px;
      border:none;
      border-radius:8px;
      background:#38bdf8;
      cursor:pointer;
      font-weight:bold;
    }

    #recommend {
      margin:10px;
      font-size:18px;
      color:#38bdf8;
    }

    /* INFO PANEL */
    #infoPanel {
      position:fixed;
      right:20px;
      top:80px;
      width:250px;
      background:#111827;
      padding:15px;
      border-radius:10px;
      display:none;
      text-align:left;
    }

  </style>
</head>

<body>

<h1>🌊 Smart Manhole System</h1>
<button onclick="toggleRain()">🌧 Toggle Rain</button>

<div id="recommend">Recommended Path: --</div>

<div id="network"></div>

<!-- INFO PANEL -->
<div id="infoPanel"></div>

<script>

// CREATE 15 NODES
const nodes = new vis.DataSet([
  {id:1,x:-320,y:-120},{id:2,x:-180,y:-180},{id:3,x:-20,y:-140},{id:4,x:150,y:-170},{id:5,x:300,y:-120},

  {id:6,x:-350,y:20},{id:7,x:-180,y:40},{id:8,x:0,y:10},{id:9,x:160,y:60},{id:10,x:330,y:20},

  {id:11,x:-300,y:180},{id:12,x:-120,y:160},{id:13,x:50,y:200},{id:14,x:220,y:170},{id:15,x:350,y:210}
].map(n => ({...n,label:"MH"+n.id})));

// EDGES (GRID)
const edges = new vis.DataSet([
  {from:1,to:2},{from:2,to:3},{from:3,to:4},{from:4,to:5},

  {from:1,to:6},{from:2,to:7},{from:3,to:8},{from:4,to:9},{from:5,to:10},

  {from:6,to:7},{from:7,to:8},{from:8,to:9},{from:9,to:10},

  {from:6,to:11},{from:7,to:12},{from:8,to:13},{from:9,to:14},{from:10,to:15},

  {from:11,to:12},{from:12,to:13},{from:13,to:14},{from:14,to:15},

  // EXTRA cross links (important for realism)
  {from:2,to:8},{from:7,to:3},{from:8,to:4},{from:9,to:13}
]);

// NETWORK
const network = new vis.Network(
  document.getElementById("network"),
  {nodes,edges},
  {physics:false, nodes:{shape:"dot",size:18,font:{color:"white"}}}
);

// STATE
let rain = false;

// LEVELS
let levels = {};
for(let i=1;i<=15;i++) levels[i] = 20 + Math.random()*20;

// EXTRA DATA (for panel)
function getDetails(id){
  return {
    serial: "SN-"+(1000+id),
    volume: (50 + id*5) + " m³",
    area: "Zone " + ((id%5)+1),
    waterbody: ["River","Lake","Drain","Canal","None"][id%5]
  };
}

// STATUS
function getStatus(l){
  if(l<40) return "normal";
  if(l<70) return "warning";
  return "overflow";
}

// RAIN TOGGLE
function toggleRain(){
  rain = !rain;
  alert("Rain is now " + (rain ? "ON 🌧" : "OFF ☀"));
}

// CLICK EVENT (INFO PANEL)
network.on("click", function(params){
  if(params.nodes.length > 0){
    let id = params.nodes[0];
    let d = getDetails(id);

    document.getElementById("infoPanel").style.display="block";
    document.getElementById("infoPanel").innerHTML = `
      <h3>MH${id}</h3>
      <p><b>Serial:</b> ${d.serial}</p>
      <p><b>Volume:</b> ${d.volume}</p>
      <p><b>Area:</b> ${d.area}</p>
      <p><b>Nearby Waterbody:</b> ${d.waterbody}</p>
    `;
  }
});

// GRAPH FOR PATH
function buildGraph(){
  let g={};
  edges.forEach(e=>{
    if(!g[e.from]) g[e.from]=[];
    if(!g[e.to]) g[e.to]=[];
    g[e.from].push(e.to);
    g[e.to].push(e.from);
  });
  return g;
}

// PATH (BFS)
function getDynamicPath(){

  let graph = buildGraph();

  // ✅ FIND MOST CRITICAL NODE (highest water level)
  let start = 1;
  let max = levels[1];

  for(let i=2;i<=15;i++){
    if(levels[i] > max){
      max = levels[i];
      start = i;
    }
  }

  // ✅ FIND SAFEST NODE (lowest level)
  let target = 1;
  let min = levels[1];

  for(let i=2;i<=15;i++){
    if(levels[i] < min){
      min = levels[i];
      target = i;
    }
  }

  // BFS
  let queue = [[start]];
  let visited = new Set();

  while(queue.length){
    let path = queue.shift();
    let node = path[path.length-1];

    if(node === target) return path;

    if(!visited.has(node)){
      visited.add(node);

      for(let nei of graph[node]){
        if(getStatus(levels[nei]) !== "overflow"){
          queue.push([...path, nei]);
        }
      }
    }
  }

  return null;
}

// UPDATE LOOP
function update(){

  for(let i=1;i<=15;i++){

    // REALISTIC PHYSICS
    if(rain){
      levels[i] += 1 + Math.random()*2;  // rise
    } else {
      levels[i] -= 1 + Math.random()*1.5; // drain
    }

    levels[i] = Math.max(5, Math.min(100, levels[i]));

    let level = Math.floor(levels[i]);
    let status = getStatus(level);

    let color = status==="normal"?"green":
                status==="warning"?"orange":"red";

    nodes.update({
      id:i,
      label:`MH${i}\n${level}%`,
      color:color
    });
  }

  // PATH
  let p = getDynamicPath();
  document.getElementById("recommend").innerText =
    p ? "Recommended Path: " + p.map(n=>"MH"+n).join(" → ")
      : "No Safe Path Available!";
  console.log("Start:", start, "Target:", target);
}

setInterval(update,2000);

</script>

</body>
</html>
