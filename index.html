<!DOCTYPE html>
<html>
<head>
  <title>Smart Drainage System</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
    body {
      margin:0;
      font-family:'Segoe UI';
      background:#0f172a;
      color:white;
      text-align:center;
    }

    #network {
      height:450px;
      margin:20px;
      border-radius:10px;
      background:#020617;
    }

    button {
      padding:10px 20px;
      margin:10px;
      border:none;
      border-radius:8px;
      background:#38bdf8;
      cursor:pointer;
      font-weight:bold;
    }

    .card {
      display:inline-block;
      padding:10px;
      margin:8px;
      border-radius:10px;
      width:120px;
    }

    .normal { background:green; }
    .warning { background:orange; }
    .overflow { background:red; }

    #recommend {
      margin:10px;
      font-size:18px;
      color:#38bdf8;
    }
  </style>
</head>

<body>

<h1>🌊 Smart Manhole System</h1>
<button onclick="toggleRain()">🌧 Toggle Rain</button>

<div id="recommend">Recommended Path: --</div>

<div id="network"></div>

<div id="cards"></div>

<script>

// CREATE 15 NODES (GRID)
const nodes = new vis.DataSet([
{id:1,x:-300,y:-150},{id:2,x:-150,y:-150},{id:3,x:0,y:-150},{id:4,x:150,y:-150},{id:5,x:300,y:-150},
{id:6,x:-300,y:0},{id:7,x:-150,y:0},{id:8,x:0,y:0},{id:9,x:150,y:0},{id:10,x:300,y:0},
{id:11,x:-300,y:150},{id:12,x:-150,y:150},{id:13,x:0,y:150},{id:14,x:150,y:150},{id:15,x:300,y:150}
].map(n => ({...n,label:"MH"+n.id})));

// CONNECTIONS (GRID NETWORK)
const edges = new vis.DataSet([
{from:1,to:2},{from:2,to:3},{from:3,to:4},{from:4,to:5},
{from:6,to:7},{from:7,to:8},{from:8,to:9},{from:9,to:10},
{from:11,to:12},{from:12,to:13},{from:13,to:14},{from:14,to:15},

{from:1,to:6},{from:6,to:11},
{from:2,to:7},{from:7,to:12},
{from:3,to:8},{from:8,to:13},
{from:4,to:9},{from:9,to:14},
{from:5,to:10},{from:10,to:15}
]);

const network = new vis.Network(
  document.getElementById("network"),
  {nodes,edges},
  {physics:false, nodes:{shape:"dot",size:18,font:{color:"white"}}}
);

// STATE
let rain = false;
let levels = {};
for(let i=1;i<=15;i++) levels[i] = Math.random()*40;

// STATUS
function getStatus(l){
  if(l<40) return "normal";
  if(l<70) return "warning";
  return "overflow";
}

// RAIN
function toggleRain(){
  rain = !rain;
}

// PATH RECOMMENDATION (simple BFS avoiding overflow)
function getSafePath(){
  let graph = {};
  edges.forEach(e=>{
    if(!graph[e.from]) graph[e.from]=[];
    if(!graph[e.to]) graph[e.to]=[];
    graph[e.from].push(e.to);
    graph[e.to].push(e.from);
  });

  let start = 1;
  let target = 15;

  let queue = [[start]];
  let visited = new Set();

  while(queue.length){
    let path = queue.shift();
    let node = path[path.length-1];

    if(node===target) return path;

    if(!visited.has(node)){
      visited.add(node);

      for(let nei of graph[node]){
        // avoid overflow nodes
        if(getStatus(levels[nei]) !== "overflow"){
          queue.push([...path,nei]);
        }
      }
    }
  }

  return null;
}

// UPDATE LOOP
function update(){
  let cardsHTML = "";

  for(let i=1;i<=15;i++){

    if(rain) levels[i]+=Math.random()*4;
    else levels[i]-=Math.random()*2;

    levels[i] = Math.max(10,Math.min(100,levels[i]));

    let level = Math.floor(levels[i]);
    let status = getStatus(level);

    let color = status==="normal"?"green":
                status==="warning"?"orange":"red";

    nodes.update({
      id:i,
      label:`MH${i}\n${level}%`,
      color:color
    });

    cardsHTML += `
      <div class="card ${status}">
        MH${i}<br>${level}%<br>${status}
      </div>
    `;
  }

  document.getElementById("cards").innerHTML = cardsHTML;

  // PATH
  let path = getSafePath();
  if(path){
    document.getElementById("recommend").innerText =
      "Recommended Path: " + path.map(n=>"MH"+n).join(" → ");
  } else {
    document.getElementById("recommend").innerText =
      "No Safe Path Available!";
  }
}

setInterval(update,2000);

</script>

</body>
</html>
